<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline' file:; script-src 'unsafe-inline'; img-src 'self' data:;">
<title>Claude Traffic Light</title>
<link rel="stylesheet" href="../media/traffic-light-base.css">
<style>
/* standalone 窗口的发光半径稍小一点(窗口本身就小,大半径会糊出去) */
:root {
  --glow-near: 30px;
  --glow-far: 60px;
  --container-padding: 10%;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: transparent;  /* 整个窗口透明 */
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  user-select: none;
  -webkit-user-select: none;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
  /* 删掉 padding: 8px; 让灯箱贴边,避免周围留出灰底 */
}

/* The whole frame is draggable; interactive bits opt out via no-drag. */
.traffic-light {
  -webkit-app-region: drag;
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  height: 100%;
  padding: 28px 0 8px;  /* 顶部留28px给按钮,左右0让灯箱贴边,底部只留8px */
  /* 软糖式圆角:改小一点,让轮廓更贴合内容 */
  border-radius: 28%/10%;
  background:
    /* 主体渐变:顶亮底暗,模拟从上方打来的环境光 */
    radial-gradient(ellipse at 50% -20%, #3a4148 0%, transparent 55%),
    linear-gradient(180deg, #262b30 0%, #1a1d22 35%, #101216 75%, #07090b 100%);
  box-shadow:
    /* 删掉外部投影（那两行 0 30px / 0 12px），只保留 inset 塑造立体感 */
    /* 顶部细高光环:模拟曲面边缘的反光 */
    inset 0 2px 0 rgba(255,255,255,0.12),
    inset 0 4px 8px rgba(255,255,255,0.04),
    /* 底部深阴影:让整体"鼓起来" */
    inset 0 -8px 20px rgba(0,0,0,0.7),
    inset 0 -2px 0 rgba(0,0,0,0.5),
    /* 边缘 1px 描边,提升精致感 */
    inset 0 0 0 1px rgba(255,255,255,0.04);
  gap: 10px;  /* 灯之间的间距缩小,让整体更紧凑 */
  position: relative;
  /* 加一个微妙的整体过渡,鼠标 hover 时(后面可加效果)更平滑 */
  transition: box-shadow 0.3s ease;
}
/* 顶部弧形反光带:对应图标里那道横贯的曲面高光 */
.traffic-light::before {
  content: '';
  position: absolute;
  top: 0; left: 8%;
  width: 84%;
  height: 38%;
  border-radius: 50% 50% 50% 50% / 100% 100% 0 0;
  background: linear-gradient(180deg,
    rgba(255,255,255,0.10) 0%,
    rgba(255,255,255,0.04) 40%,
    transparent 100%);
  pointer-events: none;
  z-index: 0;
}
/* 底部柔和暗带:进一步强化"凸起的方块"立体感 */
.traffic-light::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%;
  width: 80%;
  height: 25%;
  border-radius: 50% 50% 50% 50% / 0 0 100% 100%;
  background: linear-gradient(0deg,
    rgba(0,0,0,0.4) 0%,
    transparent 100%);
  pointer-events: none;
  z-index: 0;
}
/* 灯组要在伪元素之上 */
.light-container { position: relative; z-index: 1; }

.close-btn {
  -webkit-app-region: no-drag;
  position: absolute;
  top: 8px;
  right: 10px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #888;
  font-size: 11px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
  z-index: 10;
  padding: 0;
}
.close-btn:hover {
  background: #ff5555;
  color: #fff;
}

.pin-btn {
  -webkit-app-region: no-drag;
  position: absolute;
  top: 8px;
  right: 32px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.08);
  color: #888;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s ease;
  z-index: 10;
  padding: 0;
}
.pin-btn:hover {
  background: rgba(255,255,255,0.16);
  color: #ddd;
}
.pin-btn.active {
  background: rgba(255,221,68,0.18);
  color: #ffdd44;
}
.pin-btn.active:hover {
  background: rgba(255,221,68,0.3);
}
.pin-btn svg {
  display: block;
  transition: transform 0.2s ease;
}
.pin-btn.active svg {
  transform: rotate(-30deg);
}

/* 容器尺寸:standalone 窗口里要按窗口高度自适应 */
.light-container {
  flex: 1;
  min-height: 0;
  max-height: calc((100% - 28px) / 3);
}
</style>
</head>
<body>
<div class="traffic-light">
  <button class="pin-btn" id="pinBtn" title="置顶">
    <svg viewBox="0 0 24 24" fill="currentColor" width="10" height="10" aria-hidden="true">
      <path d="M16 9V4l1-1V2H7v1l1 1v5l-2 3v1h5v6l1 1 1-1v-6h5v-1z"/>
    </svg>
  </button>
  <button class="close-btn" id="closeBtn" title="关闭">×</button>
  <div class="light-container"><div class="light red" id="red"></div></div>
  <div class="light-container"><div class="light yellow" id="yellow"></div></div>
  <div class="light-container"><div class="light green" id="green"></div></div>
</div>
<script>
const stateMap = {
  idle:  'green',
  busy:  'yellow',
  error: 'red'
};
function setState(s) {
  const which = stateMap[s] || 'green';
  document.querySelectorAll('.light').forEach(el => el.classList.remove('active'));
  const target = document.getElementById(which);
  if (target) target.classList.add('active');
}
setState('idle');

const pinBtn = document.getElementById('pinBtn');
function reflectPin(state) {
  pinBtn.classList.toggle('active', !!state);
  pinBtn.title = state ? '已置顶（点击取消）' : '点击置顶';
}

if (window.electronAPI) {
  window.electronAPI.onStateUpdate((data) => {
    if (data && data.state) setState(data.state);
  });
  window.electronAPI.getPinState().then(reflectPin).catch(() => {});
}

pinBtn.addEventListener('click', async () => {
  if (!window.electronAPI) return;
  try {
    const next = await window.electronAPI.togglePin();
    reflectPin(next);
  } catch { /* ignore */ }
});

document.getElementById('closeBtn').addEventListener('click', () => {
  if (window.electronAPI) window.electronAPI.closeWindow();
});
</script>
</body>
</html>
